{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Downloader</title>
    <style>
        @media screen and (min-width: 500px) {
            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: scroll;
            }
            .logo{
                width: 300px;
                height: auto;
            }

            #bg-video {
                position: fixed;
                top: 0;
                left: 0;
                max-width: 100%;
            {#max-height: 100%;#}{#width: fit-content;#}{#height: fit-content;#} z-index: -1; /* behind content */
            {#object-fit: cover; /* cover the screen */#}
            }

            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                z-index: 1; /* above video */
                font-family: Arial, sans-serif;
            }
            .form__group {
                top: 150px;
              position: relative;
              padding: 20px 0 0;
              width: 100%;
              max-width: 380px;
            }
            .form__field {
              font-family: inherit;
              width: 100%;
              border: none;
              border-bottom: 2px solid #9b9b9b;
              outline: 0;
              font-size: 17px;
              color: #000;
              padding: 7px 0;
              background: transparent;
              transition: border-color 0.2s;
            }
        }
        @media screen and (max-width: 500px) {
            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: scroll;
            }
           #bg-video{
               position: fixed;
                top: 0;
                left: 0;
               z-index: -1;
               object-fit: cover;
          }
            .content {
                position: relative;
                top: 10vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                z-index: 1; /* above video */
                font-family: Arial, sans-serif;
            }
            .logo{
                width: 280px;
                height: auto;
                margin-bottom: -80px;
            }
            .form__group {
              top: 150px;
              position: relative;
              padding: 20px 0 0;
              width: 50vw;
              max-width: 500px;
            }
            .form__field {
              font-family: inherit;
              width: 100%;
              border: none;
              border-bottom: 2px solid #9b9b9b;
              outline: 0;
              font-size: 17px;
              color: #000;
              padding: 7px 0;
              background: transparent;
              transition: border-color 0.2s;
            }
        }
        *{
            font-family: Arial;
        }








.form__field::placeholder {
  color: transparent;
}

.form__field:placeholder-shown ~ .form__label {
  font-size: 17px;
  cursor: text;
  top: 20px;
}

.form__label {
  position: absolute;
  top: 0;
  display: block;
  transition: 0.2s;
  font-size: 17px;
  color: #9b9b9b;
  pointer-events: none;
}

.form__field:focus {
  padding-bottom: 6px;
  font-weight: 700;
  border-width: 3px;
  border-image: linear-gradient(to right, #116399, #38caef);
  border-image-slice: 1;
}

.form__field:focus ~ .form__label {
  position: absolute;
  top: 0;
  display: block;
  transition: 0.2s;
  font-size: 17px;
  color: #38caef;
  font-weight: 700;
}

/* reset input */
.form__field:required, .form__field:invalid {
  box-shadow: none;
}

    {#--------------------------------------#}
.cta {
  margin-top: 30px;
  border: none;
  background: none;
  cursor: pointer;
}

.cta span {
  padding-bottom: 7px;
  letter-spacing: 4px;
  font-size: 14px;
  padding-right: 15px;
  text-transform: uppercase;
}

.cta svg {
  transform: translateX(-8px);
  transition: all 0.3s ease;
}

.cta:hover svg {
  transform: translateX(0);
}

.cta:active svg {
  transform: scale(0.9);
}

.hover-underline-animation {
  position: relative;
  color: black;
  padding-bottom: 20px;
}

.hover-underline-animation:after {
  content: "";
  position: absolute;
  width: 100%;
  transform: scaleX(0);
  height: 2px;
  bottom: 0;
  left: 0;
  background-color: #000000;
  transform-origin: bottom right;
  transition: transform 0.25s ease-out;
}

.cta:hover .hover-underline-animation:after {
  transform: scaleX(1);
  transform-origin: bottom left;
}

    </style>









</head>
<body>
    <video autoplay muted loop id="bg-video">
        <source src="{%  static 'downloader/videos/Abstract-White-Background.mp4' %}" type="video/mp4">
    </video>
    <div class="content">
{#    <h1>S-Downloader</h1>#}
        <img class="logo" src="{%  static 'downloader/pictures/Logo.png' %}" alt="S-Downloader">
    <form class="form__group field" method="POST" action="{% url 'show_download_options' %}">
        {% csrf_token %}
        <input type="input" class="form__field" placeholder="Link" name="link" required>
        <label for="name" class="form__label">Enter Link</label>
        <button class="cta" type="submit">
          <span class="hover-underline-animation"> Submit </span>
          <svg
            id="arrow-horizontal"
            xmlns="http://www.w3.org/2000/svg"
            width="30"
            height="10"
            viewBox="0 0 46 16"
          >
            <path
              id="Path_10"
              data-name="Path 10"
              d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z"
              transform="translate(30)"
            ></path>
          </svg>
        </button>

    </form>
    </div>
</body>
</html>
