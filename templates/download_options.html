{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S-Downloader</title>
    <style>
        *{
            font-family: Arial;
        }
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            max-width: 100%;
            {#max-height: 100%;#}
            {#width: fit-content;#}
            {#height: fit-content;#}
            z-index: -1; /* behind content */
            {#object-fit: cover; /* cover the screen */#}
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: scroll; /* prevent scrollbars */
        }
        .content{
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            padding-left: 200px;
            padding-right: 200px;
            padding-bottom: 50px;
            z-index: 1; /* above video */
        }

        .options_container{
            position: relative;
            margin-top: 80px;
            width: 100%;
            align-self: center;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }
        .vid_types_container{
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: gray;
            border-radius: 20px;
            height: 500px;
            width: 300px;
            overflow: scroll;
        }
        .videos{
            margin: 20px;
        }
        .videos ul{
            display: flex;
            flex-direction: column;
            list-style-type: none;
            padding: 0px

        }
        .videos ul li{
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }


    {#----------------------------#}
.animated-button {
  position: relative;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 16px 36px;
  border: 4px solid;
  border-color: transparent;
  font-size: 16px;
  background-color: inherit;
  border-radius: 100px;
  font-weight: 600;
  color: greenyellow;
  box-shadow: 0 0 0 2px greenyellow;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

.animated-button svg {
  position: absolute;
  width: 24px;
  fill: greenyellow;
  z-index: 9;
  transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

.animated-button .arr-1 {
  right: 16px;
}

.animated-button .arr-2 {
  left: -25%;
}

.animated-button .circle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  background-color: greenyellow;
  border-radius: 50%;
  opacity: 0;
  transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

.animated-button .text {
  position: relative;
  z-index: 1;
  transform: translateX(-12px);
  transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

.animated-button:hover {
  box-shadow: 0 0 0 12px transparent;
  color: #212121;
  border-radius: 12px;
}

.animated-button:hover .arr-1 {
  right: -25%;
}

.animated-button:hover .arr-2 {
  left: 16px;
}

.animated-button:hover .text {
  transform: translateX(12px);
}

.animated-button:hover svg {
  fill: #212121;
}

.animated-button:active {
  scale: 0.95;
  box-shadow: 0 0 0 4px greenyellow;
}

.animated-button:hover .circle {
  width: 220px;
  height: 220px;
  opacity: 1;
}

    </style>
</head>
<body>
<video autoplay muted loop id="bg-video">
    <source src="{%  static 'downloader/videos/Abstract-White-Background.mp4' %}" type="video/mp4">
</video>
<div class="content">
<img src="{%  static 'downloader/pictures/Logo.png' %}" alt="S-Downloader" style="width: 300px; height: auto;">
{#make the below {{ title }}#}
    <h1>{{ title }}</h1>

    <div class="options_container">
        <div class="vid_types_container">
        <h1>Video's</h1>
            <div class="videos">
                    <ul>
                        {% for res in resolutions %}
                            <li><div class="submit-button-container">

                        <button class="animated-button"  onclick='window.open("{{ res.url }}")'>
                        <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
                            <path
                              d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"
                            ></path>
                        </svg>
                        <span class="text">{{ res.resolution }}</span>
                        <span class="circle"></span>
                        <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
                            <path
                            d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"
                            ></path>
                        </svg>
                    </button>
                    </div>
                            {% if res.is_progressive != True %}
                            <h5>Without Audio</h5>
                            {% endif %}
                            </li>
                        {% endfor %}

                    </ul>
            </div>

        </div>
        <div class="vid_types_container">
        <h1>Audio's</h1>
            <div class="videos">
                <ul>
                        {% for audio in audios %}
                            <li><div class="submit-button-container">

                        <button class="animated-button"  onclick='window.open("{{ audio.url }}")'>
                        <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
                            <path
                              d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"
                            ></path>
                        </svg>
                        <span class="text">{{ audio.abr }}</span>
                        <span class="circle"></span>
                        <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
                            <path
                            d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"
                            ></path>
                        </svg>
                    </button>
                    </div>
                            </li>
                        {% endfor %}

                    </ul>
            </div>

        </div>
    </div>
</div>
</body>
</html>
